name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cargo test --all-features

  version-check:
    name: Version Consistency
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check version consistency
        run: |
          for f in Cargo.toml npm/package.json python/pyproject.toml; do
            [ -f "$f" ] || { echo "::error::Required manifest not found: $f"; exit 1; }
          done
          CARGO_VER=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['package']['version'])")
          NPM_VER=$(python3 -c "import json; print(json.load(open('npm/package.json'))['version'])")
          PYPI_VER=$(python3 -c "import tomllib; print(tomllib.load(open('python/pyproject.toml','rb'))['project']['version'])")
          echo "Cargo: $CARGO_VER | npm: $NPM_VER | PyPI: $PYPI_VER"
          if [ "$CARGO_VER" != "$NPM_VER" ] || [ "$CARGO_VER" != "$PYPI_VER" ]; then
            echo "::error::Version mismatch: Cargo=$CARGO_VER npm=$NPM_VER PyPI=$PYPI_VER"
            exit 1
          fi
          echo "All versions match: $CARGO_VER"

  benchmark:
    name: Benchmark Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Detect scoring/search changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            scoring:
              - 'src/memory_core/scoring/**'
              - 'src/memory_core/storage/sqlite/search*'
              - 'src/memory_core/storage/sqlite/advanced*'

      - name: Install Rust
        if: steps.filter.outputs.scoring == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        if: steps.filter.outputs.scoring == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Run benchmark gate
        if: steps.filter.outputs.scoring == 'true'
        run: ./scripts/bench.sh --gate

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run smoke test
        run: bash scripts/smoke-test.sh
