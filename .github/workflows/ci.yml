name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cargo test --all-features

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check version consistency
        run: |
          for f in Cargo.toml npm/package.json python/pyproject.toml; do
            [ -f "$f" ] || { echo "::error::Required manifest not found: $f"; exit 1; }
          done
          CARGO_VER=$(python3 -c "import tomllib; d=tomllib.loads(open('Cargo.toml').read()); print(d['package']['version'])")
          NPM_VER=$(python3 -c "import json; print(json.load(open('npm/package.json'))['version'])")
          PYPI_VER=$(python3 -c "import tomllib; d=tomllib.loads(open('python/pyproject.toml').read()); print(d['project']['version'])")
          echo "Cargo: $CARGO_VER | npm: $NPM_VER | PyPI: $PYPI_VER"
          if [ "$CARGO_VER" != "$NPM_VER" ] || [ "$CARGO_VER" != "$PYPI_VER" ]; then
            echo "::error::Version mismatch: Cargo=$CARGO_VER npm=$NPM_VER PyPI=$PYPI_VER"
            exit 1
          fi
          echo "All versions match: $CARGO_VER"
