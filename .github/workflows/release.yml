name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.5). Creates the tag on HEAD if it doesn't exist."
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: mag
  BUILD_FEATURES: real-embeddings,mimalloc
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Detect prerelease (shell case — no grep quoting issues)
          case "$TAG" in
            *-rc*|*-alpha*|*-beta*|*-dev*)
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

          # Create tag if workflow_dispatch and tag doesn't exist
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists"
            else
              SHA="$(git rev-parse HEAD)"
              echo "Creating tag $TAG on $SHA"
              gh api "repos/${{ github.repository }}/git/refs" \
                -f ref="refs/tags/$TAG" \
                -f sha="$SHA"
            fi
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Version consistency check
        run: |
          CARGO_VER=$(python3 -c "import tomllib; d=tomllib.load(open('Cargo.toml','rb')); print(d['package']['version'])")
          NPM_VER=$(python3 -c "import json; print(json.load(open('npm/package.json'))['version'])")
          PYPI_VER=$(python3 -c "import tomllib; d=tomllib.load(open('python/pyproject.toml','rb')); print(d['project']['version'])")
          TAG_VER="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VER="${TAG_VER#v}"
          echo "Tag=$TAG_VER  Cargo=$CARGO_VER  npm=$NPM_VER  PyPI=$PYPI_VER"
          if [ "$CARGO_VER" != "$TAG_VER" ] || [ "$NPM_VER" != "$TAG_VER" ] || [ "$PYPI_VER" != "$TAG_VER" ]; then
            echo "::error::Version mismatch! Tag=$TAG_VER Cargo=$CARGO_VER npm=$NPM_VER PyPI=$PYPI_VER"
            exit 1
          fi

  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Run tests
        run: cargo test --all-features

  build:
    name: Build ${{ matrix.target }}
    needs: [preflight, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # x86_64-apple-darwin removed: ort (ONNX Runtime) has no prebuilt
          # binaries for Intel Mac, and Apple has discontinued Intel Macs.
          # Users on Intel Mac can build from source or use Rosetta.
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build
        run: cargo build --release --features ${{ env.BUILD_FEATURES }} --target ${{ matrix.target }}

      # Package: tar.gz for Linux/macOS, zip for Windows
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.zip ${{ env.BINARY_NAME }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create Release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum mag-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          files: |
            artifacts/mag-*.tar.gz
            artifacts/mag-*.zip
            artifacts/checksums.txt

  publish-crates:
    name: Publish to crates.io
    needs: [preflight, release]
    if: needs.preflight.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: [preflight, release]
    if: needs.preflight.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish
        run: npm publish --provenance --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: [preflight, release]
    if: needs.preflight.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          pip install build
          python -m build
        working-directory: python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  update-homebrew:
    name: Update Homebrew tap
    needs: [preflight, release]
    if: needs.preflight.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums from release
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          for i in 1 2 3 4 5; do
            if gh release download "$TAG" --pattern checksums.txt --repo "$GITHUB_REPOSITORY"; then
              echo "Downloaded checksums.txt"
              cat checksums.txt
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Failed to download checksums after 5 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: George-RD/homebrew-mag
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${TAG#v}"

          get_sha() { grep "$1" checksums.txt | awk '{print $1}'; }

          FORMULA=homebrew-tap/Formula/mag.rb

          # Update version
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update checksums using URL context to match the right sha256 line
          # Each sha256 line follows its URL line, so we match by the target in the URL
          sed -i "/aarch64-apple-darwin/{n;s/sha256 \"[^\"]*\"/sha256 \"$(get_sha aarch64-apple-darwin)\"/;}" "$FORMULA"
          sed -i "/aarch64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"$(get_sha aarch64-unknown-linux-gnu)\"/;}" "$FORMULA"
          sed -i "/x86_64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"$(get_sha x86_64-unknown-linux-gnu)\"/;}" "$FORMULA"

          echo "--- Updated formula ---"
          cat "$FORMULA"

      - name: Commit and push
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          VERSION="${TAG#v}"
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mag.rb
          git commit -m "mag ${VERSION}"
          git push

  smoke-test:
    name: Post-publish smoke test
    needs: [preflight, publish-crates, publish-npm, publish-pypi]
    if: needs.preflight.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mag from crates.io (with retry)
        run: |
          EXPECTED_VER="${{ needs.preflight.outputs.tag }}"
          EXPECTED_VER="${EXPECTED_VER#v}"
          # Retry up to 5 times with 30s gaps to allow crates.io index propagation
          for i in 1 2 3 4 5; do
            echo "Attempt $i: trying cargo install mag --version $EXPECTED_VER..."
            cargo install mag --version "$EXPECTED_VER" && exit 0
            echo "Attempt $i failed. Waiting 30s before retry..."
            sleep 30
          done
          echo "::error::mag failed to install from crates.io after 5 attempts"
          exit 1

      - name: Verify version
        run: |
          INSTALLED_VER=$(mag --version | awk '{print $2}')
          EXPECTED_VER="${{ needs.preflight.outputs.tag }}"
          EXPECTED_VER="${EXPECTED_VER#v}"
          echo "Installed=$INSTALLED_VER  Expected=$EXPECTED_VER"
          if [ "$INSTALLED_VER" != "$EXPECTED_VER" ]; then
            echo "::error::Smoke test: installed version ($INSTALLED_VER) != expected ($EXPECTED_VER)"
            exit 1
          fi
          echo "Smoke test passed: mag $INSTALLED_VER"

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install mag from npm (with retry)
        run: |
          EXPECTED_VER="${{ needs.preflight.outputs.tag }}"
          EXPECTED_VER="${EXPECTED_VER#v}"
          for i in 1 2 3 4 5; do
            echo "Attempt $i: trying npm install -g mag-memory@$EXPECTED_VER..."
            npm install -g "mag-memory@$EXPECTED_VER" && break
            echo "Attempt $i failed. Waiting 30s before retry..."
            sleep 30
          done

      - name: Verify npm install
        run: |
          NPM_MAG=$(npm root -g)/mag-memory/bin/mag
          if [ ! -f "$NPM_MAG" ]; then
            echo "::error::npm smoke test: bin/mag wrapper missing after install"
            exit 1
          fi
          INSTALLED_VER=$(node "$NPM_MAG" --version | awk '{print $2}')
          EXPECTED_VER="${{ needs.preflight.outputs.tag }}"
          EXPECTED_VER="${EXPECTED_VER#v}"
          echo "npm install: Installed=$INSTALLED_VER  Expected=$EXPECTED_VER"
          if [ "$INSTALLED_VER" != "$EXPECTED_VER" ]; then
            echo "::error::npm smoke test: version mismatch ($INSTALLED_VER != $EXPECTED_VER)"
            exit 1
          fi
          echo "npm smoke test passed: mag $INSTALLED_VER"
