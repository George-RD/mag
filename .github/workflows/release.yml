name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.5). Creates the tag on HEAD if it doesn't exist."
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: mag
  BUILD_FEATURES: real-embeddings,mimalloc
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  ensure-tag:
    name: Ensure tag exists
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          SHA="$(git rev-parse HEAD)"
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            echo "Creating lightweight tag $TAG on $SHA"
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$SHA"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: [ensure-tag]
    if: ${{ always() && (needs.ensure-tag.result == 'success' || needs.ensure-tag.result == 'skipped') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # x86_64-apple-darwin removed: ort (ONNX Runtime) has no prebuilt
          # binaries for Intel Mac, and Apple has discontinued Intel Macs.
          # Users on Intel Mac can build from source or use Rosetta.
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build
        run: cargo build --release --features ${{ env.BUILD_FEATURES }} --target ${{ matrix.target }}

      # Package: tar.gz for Linux/macOS, zip for Windows
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.zip ${{ env.BINARY_NAME }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum mag-* > checksums.txt
          cat checksums.txt

      - name: Detect prerelease
        id: meta
        run: |
          TAG="${RELEASE_TAG}"
          if echo "$TAG" | grep -qE '-(rc|alpha|beta|dev)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            artifacts/mag-*.tar.gz
            artifacts/mag-*.zip
            artifacts/checksums.txt

  publish-crates:
    name: Publish to crates.io
    needs: release
    if: ${{ !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: release
    if: ${{ !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish
        run: npm publish --provenance --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: ${{ !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          pip install build
          python -m build
        working-directory: python
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    if: ${{ !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums from release
        run: |
          TAG="${RELEASE_TAG}"
          gh release download "$TAG" --pattern checksums.txt --repo "$GITHUB_REPOSITORY"
          cat checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: George-RD/homebrew-mag
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"

          get_sha() { grep "$1" checksums.txt | awk '{print $1}'; }

          FORMULA=homebrew-tap/Formula/mag.rb

          # Update version
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update checksums using URL context to match the right sha256 line
          # Each sha256 line follows its URL line, so we match by the target in the URL
          sed -i "/aarch64-apple-darwin/{n;s/sha256 \"[^\"]*\"/sha256 \"$(get_sha aarch64-apple-darwin)\"/;}" "$FORMULA"
          sed -i "/x86_64-apple-darwin/{n;s/sha256 \"[^\"]*\"/sha256 \"$(get_sha x86_64-apple-darwin)\"/;}" "$FORMULA"
          sed -i "/aarch64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"$(get_sha aarch64-unknown-linux-gnu)\"/;}" "$FORMULA"
          sed -i "/x86_64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"$(get_sha x86_64-unknown-linux-gnu)\"/;}" "$FORMULA"

          echo "--- Updated formula ---"
          cat "$FORMULA"

      - name: Commit and push
        run: |
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mag.rb
          git commit -m "mag ${VERSION}"
          git push
