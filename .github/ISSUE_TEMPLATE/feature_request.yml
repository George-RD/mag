name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please provide enough context for maintainers to evaluate it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the feature you'd like.
      placeholder: What do you want MAG to do?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Use Case
      description: Why do you need this? What problem does it solve?
      placeholder: Describe the situation or workflow that would benefit.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Optional — how might this be implemented?
      placeholder: Any ideas on approach, API shape, or behavior?
    validations:
      required: false
